trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  acrName: 'suryadevopsacr'
  acrLoginServer: 'suryadevopsacr.azurecr.io'
  imageName: 'health-dashboard'
  aksCluster: 'surya-aks-cluster'
  resourceGroup: 'surya-devops-rg'

stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: Build
    steps:
    - task: Docker@2
      displayName: 'Build and Push to ACR'
      inputs:
        containerRegistry: 'acr-connection'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: 'app/Dockerfile'
        tags: '$(Build.BuildId)'

- stage: Deploy
  displayName: 'Deploy to AKS'
  jobs:
  - job: Deploy
    steps:
    - task: KubernetesManifest@0
      displayName: 'Deploy to AKS'
      inputs:
        action: 'deploy'
        kubernetesServiceConnection: 'aks-connection'
        manifests: 'kubernetes/deployment.yaml'
        containers: '$(acrLoginServer)/$(imageName):$(Build.BuildId)'